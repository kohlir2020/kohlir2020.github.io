name: Compile Resume PDF

on:
  push:
    paths:
      - 'assets/rk_resume.tex'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: assets/rk_resume.tex

      - name: Move PDF to assets
        run: mv rk_resume.pdf assets/rk_resume.pdf

      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/rk_resume.pdf
          git diff --cached --quiet || git commit -m "Auto-compile resume PDF from LaTeX source"
          git push
